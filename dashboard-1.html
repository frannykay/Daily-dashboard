<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #202020;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --text-dim: #6a6560;
    --text-mid: #9a9490;
    --accent: #7fb5a8;
    --accent-dim: #2a4a45;
    --warm: #c8a96e;
    --warm-dim: #3a2e1a;
    --check: #5a9a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 28px 24px;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    margin-bottom: 28px;
  }

  .day-type {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .date-line {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 2px;
  }

  .time-line {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  /* ── MORNING CHECK-IN ── */
  .checkin {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--warm);
    padding: 14px 16px;
    margin-bottom: 18px;
    border-radius: 2px;
  }

  .checkin-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 10px;
  }

  .checkin-question {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .checkin-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── SCHEDULE ── */
  .schedule {
    margin-bottom: 18px;
  }

  .schedule-item {
    display: flex;
    gap: 14px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }

  .schedule-item:last-child {
    border-bottom: none;
  }

  .schedule-time {
    font-size: 10px;
    color: var(--accent);
    min-width: 52px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
    padding-top: 1px;
  }

  .schedule-task {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .schedule-task.highlight {
    color: var(--text);
  }

  /* ── WORK BLOCK ── */
  .work-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin-bottom: 18px;
    border-radius: 2px;
  }

  .work-block-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .work-block-time {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .work-block-note {
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── REST DAY ── */
  .rest-day {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 18px;
    border-radius: 2px;
    text-align: center;
  }

  .rest-day-text {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── CHECKLIST ── */
  .checklist {
    margin-bottom: 18px;
  }

  .check-item {
    display: flex;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .check-item:last-child { border-bottom: none; }

  .check-item.done .check-box {
    border-color: var(--check);
    background: var(--check);
  }

  .check-item.done .check-box::after {
    opacity: 1;
  }

  .check-item.done .check-text {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }

  .check-box {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s ease;
  }

  .check-box::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: 1.5px solid #0f0f0f;
    border-top: none;
    border-left: none;
    transform: rotate(40deg);
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .check-text {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.4;
    transition: color 0.15s ease;
  }

  .check-text em {
    font-style: normal;
    color: var(--text-dim);
    font-size: 10px;
  }

  /* ── PT BADGE ── */
  .pt-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .pt-badge.off {
    color: var(--text-dim);
    border-color: var(--border);
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-note {
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  .reset-btn {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    border-radius: 2px;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:hover { color: var(--text-mid); border-color: var(--text-dim); }

  /* ── FADE IN ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header        { animation: fadeUp 0.4s ease both; }
  .checkin       { animation: fadeUp 0.4s ease 0.05s both; }
  .schedule      { animation: fadeUp 0.4s ease 0.1s both; }
  .work-block,
  .rest-day      { animation: fadeUp 0.4s ease 0.15s both; }
  .checklist     { animation: fadeUp 0.4s ease 0.2s both; }
  .footer        { animation: fadeUp 0.4s ease 0.25s both; }
</style>
</head>
<body>

<div class="header">
  <div class="day-type" id="dayType"></div>
  <div class="date-line" id="dateLine"></div>
  <div class="time-line" id="timeLine"></div>
</div>

<div class="checkin">
  <div class="checkin-label">Morning check-in</div>
  <div class="checkin-question">Am I visiting Mom today?</div>
  <div class="checkin-sub">Decide now so you can plan around it.</div>
</div>

<div class="schedule" id="scheduleSection">
  <div class="section-label">Today's shape</div>
  <div id="scheduleItems"></div>
</div>

<div id="workSection"></div>

<hr class="divider">

<div class="checklist">
  <div class="section-label">Did I have a good day?</div>
  <div id="checkItems"></div>
</div>

<div class="footer">
  <div class="footer-note">medication · check calendar · one project task</div>
  <button class="reset-btn" onclick="resetChecks()">reset</button>
</div>

<script>
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const WORK_DAYS = [3, 4, 6]; // Wed, Thu, Sat
  const PT_DAYS   = [3, 4, 6]; // same for now

  function isWorkDay(d) { return WORK_DAYS.includes(d.getDay()); }
  function isPTDay(d)   { return PT_DAYS.includes(d.getDay()); }

  function getOrdinal(n) {
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  const now = new Date();
  const dow = now.getDay();
  const workDay = isWorkDay(now);
  const ptDay   = isPTDay(now);

  // Header
  document.getElementById('dayType').textContent = workDay ? 'Work Day' : 'Rest Day';
  document.getElementById('dateLine').textContent = `${DAYS[dow]}, ${MONTHS[now.getMonth()]} ${getOrdinal(now.getDate())}`;

  function updateTime() {
    const t = new Date();
    let h = t.getHours(), m = t.getMinutes();
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    document.getElementById('timeLine').textContent = `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }
  updateTime();
  setInterval(updateTime, 30000);

  // Auto-refresh at 3am to roll over to the new day
  function scheduleRefresh() {
    const now = new Date();
    const next3am = new Date();
    next3am.setHours(3, 0, 0, 0);
    if (next3am <= now) next3am.setDate(next3am.getDate() + 1);
    const msUntil3am = next3am - now;
    setTimeout(() => location.reload(), msUntil3am);
  }
  scheduleRefresh();

  // Schedule
  const morningItems = [
    ['~9:15',  'Dogs out (Layla, then Didi). Meds for both.'],
    ['~10:00', 'Muffin + coffee. Did you take your meds?'],
    ['~10:10', 'Meditate — 3 to 5 minutes.'],
  ];

  const afternoonItems = [
    ['Afternoon', 'Make food when hungry.'],
    ['After eating', 'PT exercises.'],
  ];

  const eveningItems = [
    ['~8:00–8:30', 'Feed dogs and take out.'],
    ['~8:30',      'Snack + TV.'],
    ['~10:30',     'Bedroom. Audiobook. Sleep.'],
  ];

  const allItems = [...morningItems, ...afternoonItems, ...eveningItems];

  const scheduleEl = document.getElementById('scheduleItems');
  allItems.forEach(([time, task]) => {
    const div = document.createElement('div');
    div.className = 'schedule-item';
    const isMorning = morningItems.some(i => i[0] === time);
    div.innerHTML = `
      <span class="schedule-time">${time}</span>
      <span class="schedule-task${isMorning ? ' highlight' : ''}">${task}</span>
    `;
    scheduleEl.appendChild(div);
  });

  // Work block
  const workEl = document.getElementById('workSection');
  if (workDay) {
    workEl.innerHTML = `
      <div class="work-block">
        <div class="work-block-label">Work block</div>
        <div class="work-block-time">10:15 → 1:00 pm</div>
        <div class="work-block-note">Laptop open, work-facing. Monday boards count.${now.getDay() === 6 ? ' Bookkeeper is in today.' : ''}</div>
      </div>
    `;
  } else {
    workEl.innerHTML = `
      <div class="rest-day">
        <div class="rest-day-text">Rest day — no work block today.</div>
      </div>
    `;
  }

  // Checklist
  const checks = [
    { id: 'morning',  text: 'Morning routine done', sub: 'dogs · meds · coffee · meditation' },
    { id: 'project',  text: 'One project task', sub: 'something with a visible result' },
    { id: 'work',     text: 'Work block done', sub: 'Wed · Thu · Sat only', workOnly: true },
    { id: 'pt',       text: `PT exercises`, sub: 'Wed · Thu · Sat', ptOnly: true },
    { id: 'dogs-eve', text: 'Dogs fed and out before 8:30', sub: '' },
  ];

  const storage = {};
  const KEY = `checks-${now.toDateString()}`;

  function loadChecks() {
    try {
      const saved = localStorage.getItem(KEY);
      return saved ? JSON.parse(saved) : {};
    } catch(e) { return {}; }
  }

  function saveChecks(state) {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
  }

  let checkState = loadChecks();

  const checkEl = document.getElementById('checkItems');
  checks.forEach(c => {
    if (c.workOnly && !workDay) return;
    if (c.ptOnly && !ptDay) return;

    const div = document.createElement('div');
    div.className = 'check-item' + (checkState[c.id] ? ' done' : '');
    div.dataset.id = c.id;
    div.innerHTML = `
      <div class="check-box"></div>
      <div class="check-text">${c.text}${c.sub ? ` <em>— ${c.sub}</em>` : ''}</div>
    `;
    div.addEventListener('click', () => {
      checkState[c.id] = !checkState[c.id];
      div.classList.toggle('done', checkState[c.id]);
      saveChecks(checkState);
    });
    checkEl.appendChild(div);
  });

  function resetChecks() {
    checkState = {};
    saveChecks(checkState);
    document.querySelectorAll('.check-item').forEach(el => el.classList.remove('done'));
  }
</script>
</body>
</html>
